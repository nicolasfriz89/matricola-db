<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Controllo Matricola</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;600&family=IBM+Plex+Sans:wght@300;500;700&display=swap');

  :root {
    --bg: #0f1117;
    --surface: #1a1d26;
    --border: #2a2d3a;
    --text: #e8eaf0;
    --muted: #6b7280;
    --accent: #4f8ef7;
    --green: #22c55e;
    --red: #ef4444;
    --green-glow: rgba(34,197,94,0.25);
    --red-glow: rgba(239,68,68,0.25);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'IBM Plex Sans', sans-serif;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: flex-start;
    padding: 40px 20px;
  }

  .header { text-align: center; margin-bottom: 40px; }
  .header h1 { font-size: 1.8rem; font-weight: 700; letter-spacing: -0.02em; }
  .header p { margin-top: 8px; color: var(--muted); font-size: 0.9rem; font-weight: 300; }

  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 36px;
    width: 100%;
    max-width: 520px;
  }

  /* DB STATUS BAR */
  .db-bar {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 28px;
    padding-bottom: 28px;
    border-bottom: 1px solid var(--border);
  }

  .db-dot {
    width: 10px; height: 10px;
    border-radius: 50%;
    background: var(--muted);
    flex-shrink: 0;
    transition: background 0.3s;
  }
  .db-dot.loading { background: var(--accent); animation: pulse 1s infinite; }
  .db-dot.ok      { background: var(--green); }
  .db-dot.error   { background: var(--red); }

  @keyframes pulse {
    0%,100% { opacity: 1; } 50% { opacity: 0.3; }
  }

  .db-text {
    font-size: 0.82rem;
    font-family: 'IBM Plex Mono', monospace;
    color: var(--muted);
    flex: 1;
  }
  .db-text.ok    { color: var(--green); }
  .db-text.error { color: var(--red); }

  .btn-reload {
    background: transparent;
    border: 1px solid var(--border);
    border-radius: 6px;
    color: var(--muted);
    font-size: 0.8rem;
    padding: 5px 10px;
    cursor: pointer;
    font-family: 'IBM Plex Sans', sans-serif;
    transition: border-color 0.15s, color 0.15s;
  }
  .btn-reload:hover { border-color: var(--accent); color: var(--accent); }

  .progress-bar {
    height: 3px;
    background: var(--border);
    border-radius: 99px;
    margin-top: -20px;
    margin-bottom: 24px;
    overflow: hidden;
    display: none;
  }
  .progress-fill {
    height: 100%;
    width: 0%;
    background: var(--accent);
    border-radius: 99px;
    transition: width 0.3s;
  }

  /* FORM */
  .field { margin-bottom: 20px; }
  label {
    display: block;
    font-size: 0.78rem;
    font-weight: 500;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 8px;
  }
  input[type=text] {
    width: 100%;
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 12px 16px;
    font-family: 'IBM Plex Mono', monospace;
    font-size: 1rem;
    color: var(--text);
    outline: none;
    transition: border-color 0.2s;
  }
  input[type=text]:focus { border-color: var(--accent); }
  input[type=text]:disabled { opacity: 0.35; cursor: not-allowed; }

  .btn {
    width: 100%;
    margin-top: 8px;
    padding: 14px;
    background: var(--accent);
    color: #fff;
    border: none;
    border-radius: 8px;
    font-family: 'IBM Plex Sans', sans-serif;
    font-size: 1rem;
    font-weight: 600;
    cursor: pointer;
    transition: opacity 0.15s, transform 0.1s;
  }
  .btn:hover { opacity: 0.88; }
  .btn:active { transform: scale(0.98); }
  .btn:disabled { opacity: 0.35; cursor: not-allowed; transform: none; }

  /* SEMAFORO */
  .result-box {
    margin-top: 28px;
    border-radius: 12px;
    border: 1px solid var(--border);
    padding: 28px 24px;
    display: none;
    animation: fadeIn 0.3s ease;
  }
  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(8px); }
    to   { opacity: 1; transform: translateY(0); }
  }
  .result-box.green { border-color: var(--green); background: rgba(34,197,94,0.06); box-shadow: 0 0 24px var(--green-glow); }
  .result-box.red   { border-color: var(--red);   background: rgba(239,68,68,0.06);  box-shadow: 0 0 24px var(--red-glow); }

  .semaforo { display: flex; justify-content: center; margin-bottom: 20px; }
  .light-wrap {
    background: #111;
    border-radius: 50px;
    padding: 10px;
    display: inline-flex;
    flex-direction: column;
    gap: 10px;
    border: 2px solid #333;
  }
  .light { width: 48px; height: 48px; border-radius: 50%; transition: all 0.4s ease; }
  .light.red-l    { background: #3a1010; }
  .light.yellow-l { background: #2e2a10; }
  .light.green-l  { background: #0e2e14; }

  .result-box.green .light.green-l { background: var(--green); box-shadow: 0 0 18px var(--green), 0 0 40px var(--green-glow); }
  .result-box.red   .light.red-l   { background: var(--red);   box-shadow: 0 0 18px var(--red),   0 0 40px var(--red-glow); }

  .result-status { text-align: center; font-size: 1.1rem; font-weight: 700; margin-bottom: 12px; }
  .result-box.green .result-status { color: var(--green); }
  .result-box.red   .result-status { color: var(--red); }

  .result-detail { font-size: 0.85rem; color: var(--muted); text-align: center; line-height: 1.6; }
  .result-detail strong { color: var(--text); font-family: 'IBM Plex Mono', monospace; }

  .dates-title { margin-top: 16px; text-align: center; font-size: 0.75rem; letter-spacing: 0.08em; text-transform: uppercase; color: var(--muted); margin-bottom: 8px; }
  .dates-list { display: flex; flex-wrap: wrap; gap: 6px; justify-content: center; }
  .date-chip {
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 4px;
    padding: 3px 8px;
    font-family: 'IBM Plex Mono', monospace;
    font-size: 0.78rem;
    color: var(--muted);
  }

  .not-found {
    margin-top: 28px;
    padding: 20px;
    border-radius: 12px;
    border: 1px dashed var(--border);
    text-align: center;
    color: var(--muted);
    font-size: 0.88rem;
    display: none;
    animation: fadeIn 0.3s ease;
  }
  .not-found span { display: block; font-size: 1.5rem; margin-bottom: 8px; }
</style>
</head>

  <h1>Controllo Matricola</h1>
  <p>Verifica il numero di registrazioni per matricola e codice modello</p>
</div>

<div class="card">

  <!-- DB STATUS -->
  <div class="db-bar">
    <div class="db-dot loading" id="dbDot"></div>
    <span class="db-text" id="dbText">Caricamento database...</span>
    <button class="btn-reload" onclick="loadDB()" title="Ricarica database">&#x21BB; Aggiorna</button>
  </div>
  <div class="progress-bar" id="progressBar">
    <div class="progress-fill" id="progressFill"></div>
  </div>

  <!-- FORM -->
  <div class="field">
    <label>Codice Modello</label>
    <input type="text" id="modello" placeholder="es. BMV6" autocomplete="off" spellcheck="false" disabled>
  </div>
  <div class="field">
    <label>Matricola (Nr. Seriale)</label>
    <input type="text" id="matricola" placeholder="es. 08389015" autocomplete="off" spellcheck="false" disabled>
  </div>
  <button class="btn" id="btnCerca" onclick="cerca()" disabled>Verifica</button>

  <!-- Risultato -->
  <div class="result-box" id="resultBox">
    <div class="semaforo">
      <div class="light-wrap">
        <div class="light red-l"></div>
        <div class="light yellow-l"></div>
        <div class="light green-l"></div>
      </div>
    </div>
    <div class="result-status" id="resultStatus"></div>
    <div class="result-detail" id="resultDetail"></div>
    <div class="dates-title" id="datesTitle" style="display:none">Date di registrazione</div>
    <div class="dates-list" id="datesList"></div>
  </div>

  <!-- Non trovato -->
  <div class="not-found" id="notFound">
    <span>&#x26A0;&#xFE0F;</span>
    Nessun risultato trovato per questa combinazione di <strong>Matricola + Codice Modello</strong>.
  </div>
</div>

<script>
const CSV_URL = 'https://raw.githubusercontent.com/nicolasfriz89/matricola-db/main/programma.csv';
let DB = null;

function setDBState(state, message) {
  const dot  = document.getElementById('dbDot');
  const text = document.getElementById('dbText');
  dot.className  = 'db-dot ' + state;
  text.className = 'db-text ' + (state === 'ok' ? 'ok' : state === 'error' ? 'error' : '');
  text.textContent = message;
}

function setFormEnabled(enabled) {
  document.getElementById('modello').disabled  = !enabled;
  document.getElementById('matricola').disabled = !enabled;
  document.getElementById('btnCerca').disabled  = !enabled;
}

async function loadDB() {
  DB = null;
  setFormEnabled(false);
  setDBState('loading', 'Caricamento database...');
  document.getElementById('resultBox').style.display = 'none';
  document.getElementById('notFound').style.display  = 'none';

  const progressBar  = document.getElementById('progressBar');
  const progressFill = document.getElementById('progressFill');
  progressBar.style.display = 'block';
  progressFill.style.width  = '15%';

  try {
    const resp = await fetch(CSV_URL);
    if (!resp.ok) throw new Error('HTTP ' + resp.status);

    progressFill.style.width = '50%';
    const text = await resp.text();
    progressFill.style.width = '80%';

    DB = parseCSV(text);
    const count = Object.keys(DB).length;

    progressFill.style.width = '100%';
    setTimeout(() => { progressBar.style.display = 'none'; }, 500);

    setDBState('ok', '✓ Database caricato — ' + count.toLocaleString('it-IT') + ' combinazioni');
    setFormEnabled(true);

  } catch(err) {
    progressBar.style.display = 'none';
    setDBState('error', '✗ Errore caricamento: ' + err.message);
  }
}

function parseCSV(text) {
  if (text.charCodeAt(0) === 0xFEFF) text = text.slice(1);
  const lines = text.split(/\r?\n/);
  if (lines.length < 2) throw new Error('File CSV vuoto o non valido.');

  const header = lines[0];
  const sep = header.includes(';') ? ';' : ',';
  const cols = header.split(sep).map(c => c.trim().replace(/^"|"$/g, '').toLowerCase());

  let idxModello = -1, idxSeriale = -1, idxData = -1;
  cols.forEach((c, i) => {
    if (c.includes('modello') || c.includes('model')) idxModello = i;
    if (c.includes('seriale') || c.includes('serial') || c.includes('matricola')) idxSeriale = i;
    if (c.includes('data') || c.includes('date') || c.includes('registr')) idxData = i;
  });
  if (idxData    < 0) idxData    = 0;
  if (idxModello < 0) idxModello = 1;
  if (idxSeriale < 0) idxSeriale = 2;

  const db = {};
  for (let i = 1; i < lines.length; i++) {
    const line = lines[i].trim();
    if (!line) continue;
    const parts = line.split(sep).map(p => p.trim().replace(/^"|"$/g, ''));
    if (parts.length <= Math.max(idxModello, idxSeriale)) continue;
    const modello = (parts[idxModello] || '').toUpperCase();
    const seriale = (parts[idxSeriale] || '').toUpperCase();
    const data    =  parts[idxData]   || '';
    if (!modello || !seriale) continue;
    const key = seriale + '|' + modello;
    if (!db[key]) db[key] = [0];
    db[key][0]++;
    if (data) db[key].push(data);
  }
  return db;
}

function cerca() {
  if (!DB) { alert('Database non ancora caricato.'); return; }

  const modello   = document.getElementById('modello').value.trim().toUpperCase();
  const matricola = document.getElementById('matricola').value.trim().toUpperCase();
  const resultBox    = document.getElementById('resultBox');
  const notFound     = document.getElementById('notFound');
  const resultStatus = document.getElementById('resultStatus');
  const resultDetail = document.getElementById('resultDetail');
  const datesList    = document.getElementById('datesList');
  const datesTitle   = document.getElementById('datesTitle');

  resultBox.style.display = 'none';
  resultBox.className = 'result-box';
  notFound.style.display = 'none';
  datesList.innerHTML = '';
  datesTitle.style.display = 'none';

  if (!modello || !matricola) { alert('Inserisci sia il Codice Modello che la Matricola.'); return; }

  const key   = matricola + '|' + modello;
  const entry = DB[key];

  if (!entry) { notFound.style.display = 'block'; return; }

  const count = entry[0];
  const dates = entry.slice(1);
  const isRed = count >= 4;

  resultBox.classList.add(isRed ? 'red' : 'green');
  resultBox.style.display = 'block';

  if (isRed) {
    resultStatus.textContent = '🔴  ATTENZIONE — ' + count + ' registrazioni';
    resultDetail.innerHTML = 'La combinazione <strong>' + matricola + '</strong> / <strong>' + modello +
      '</strong> è stata registrata <strong>' + count + ' volte</strong>.<br>Soglia superata (≥ 4).';
  } else {
    resultStatus.textContent = '🟢  OK — ' + count + ' registrazion' + (count === 1 ? 'e' : 'i');
    resultDetail.innerHTML = 'La combinazione <strong>' + matricola + '</strong> / <strong>' + modello +
      '</strong> è stata registrata <strong>' + count + ' volt' + (count === 1 ? 'a' : 'e') + '</strong>.<br>Sotto la soglia (< 4).';
  }

  if (dates.length > 0) {
    datesTitle.style.display = 'block';
    dates.forEach(function(d) {
      const chip = document.createElement('span');
      chip.className = 'date-chip';
      chip.textContent = d;
      datesList.appendChild(chip);
    });
  }
}

document.addEventListener('keydown', function(e) {
  if (e.key === 'Enter' && !document.getElementById('btnCerca').disabled) cerca();
});

// Carica automaticamente all'apertura
loadDB();
</script>
